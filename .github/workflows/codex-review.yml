name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            You are a Senior React Native (Expo) Staff Engineer.

            Review this pull request for:

            ## Correctness
            - Bugs
            - Race conditions
            - Edge cases
            - Error handling

            ## React Native
            - FlatList optimization
            - Re-render issues
            - Hooks correctness
            - useEffect dependencies
            - Memory leaks
            - Keyboard handling
            - Navigation
            - Accessibility

            ## Expo
            - Expo SDK compatibility
            - OTA update safety
            - Permissions
            - Asset loading

            ## Performance
            - Memoization
            - Expensive renders
            - Bundle size
            - Images
            - Network requests

            ## TypeScript
            - Type safety
            - Avoid any
            - Null safety

            ## Architecture
            - Maintainability
            - SOLID principles
            - Component structure

            Ignore:
            - Formatting
            - Lint issues
            - Personal style preferences

            Only comment on issues that materially improve quality.
            Explain why each issue matters and suggest a concrete fix.